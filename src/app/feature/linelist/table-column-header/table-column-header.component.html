<span class="inline-flex items-center gap-1">
  {{ label() }}
  @if (sortable()) {
    @if (isActive()) {
      @if (direction() === 'DESC') {
        <svg class="w-3.5 h-3.5 text-fg-brand" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 5v14m0 0-4-4m4 4 4-4"/>
        </svg>
      } @else {
        <svg class="w-3.5 h-3.5 text-fg-brand" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19V5m0 0 4 4m-4-4L8 9"/>
        </svg>
      }
    } @else {
      <svg class="w-3.5 h-3.5 text-body opacity-40" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 20V10m0 10-3-3m3 3 3-3m5-13v10m0-10 3 3m-3-3-3 3"/>
      </svg>
    }
  }
</span>
